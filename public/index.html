<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNES Web App - MVP</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Matomo Tag -->
    <script>
      var _paq = window._paq = window._paq || [];
      /* Los métodos de rastreo deben llamarse antes de trackPageView */
      _paq.push(['trackPageView']);
      _paq.push(['enableLinkTracking']);
      (function() {
         var u="https://snes-web-app-master.matomo.cloud/"; 
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '1']); // 1 es el ID por defecto del primer sitio
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src='https://cdn.matomo.cloud/snes-web-app-master.matomo.cloud/matomo.js'; s.parentNode.insertBefore(g,s);
      })();
    </script>
    <!-- End Matomo Code -->
</head>
<body>
     <header>
        <h1>Plataforma de Preservación SNES</h1>
        <p>Servisios Web - Roberto Silva</p>
    </header>
  
    <main>
        <section id="controls">
              <select id="romSelector">
                <option value="">Consultando servidor...</option>
            </select>
            <button id="btnLoad">Cargar Juego</button>
            <button id="btnStop" style="display: none;">Detener y Cambiar</button>
        </section>

        <div id="game-container"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
